<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Linux, Docker, AWS and everything I am interested in.">
    <meta name="keywords" content="DevOps | AWS | Docker">
    <meta name="author" content="knz.dev">
    <!--<script defer src="https://umami.knz.cx/script.js" data-website-id="ff145cf4-e2e6-433e-b512-f2f8408741f1"></script> -->
    <title>knz.dev - DevOps | AWS | Docker</title>
    <style>.error-position {
	display: inline-block;
	vertical-align: middle;
}

.error-position .error-icon {
	color: fireBrick;
    width: 21px;
    display: inline-block;
    text-align: center;
}

.container {
	position: absolute;
	left: 0px;
	width: 100%;
}

.content {
	top: 3px;
	width: 30em;
	margin: 0 auto;
	background-color: #FEE;
	border: 2px solid #933;
	color: #933;
	padding: 20px;
	position: relative;
	box-shadow: #888 3px 3px 5px;
}

.close-error::after {
	content: "&#10006;";
	width: 16px;
	position: absolute;
	top: 3px;
	right: 3px;
	cursor: pointer;
}
body {
	margin-bottom: 23px;	
}

ul {
	list-style-type: none;
	padding: 0;
	margin: 0 0 0 2em;
}

li {
	position: relative;
}

.hoverable {
	display: inline-block;
}

.collapsed>.collapsible {
	display: none;
}

.ellipsis {
	display: none;
}

.collapsed>.ellipsis {
	display: inherit;
}

.collapser {
	position: absolute;
	top: .1em;
	left: -1.4em;
	cursor: default;
}

.collapser::after {
	cursor: pointer;
}

.collapsible .collapsible::before {
	top: 1.8em;
}

.status {
	position: fixed;
	left: 0;
	bottom: 0;
	border-color: #c2c2c2;
	border-top-width: 1px;
	border-right-width: 1px;
	border-bottom-width: 0px;
	border-left-width: 0px;
	border-style: solid;
	border-top-right-radius: 4px;
	height: 16px;
	padding-top: 2px;
	padding-bottom: 2px;
	padding-right: 7px;
	padding-left: 4px;
	font-family: sans-serif;
	font-size: 12px;
	opacity: 0;
	background-color: #d2d2f6;
	color: #696969;
	transition: opacity .2s ease-out;
	user-select: none;
}

.status:not(:empty) {
	opacity: 1;
}

.toolbox {
	padding-right: 3px;
	font-family: sans-serif;
	font-size: 15px;
	opacity: .25;
	background-color: #d2d2f6;
	position: fixed;
	right: 0px;
	top: 0px;
	border-color: #c2c2c2;
	border-bottom-width: 1px;
	border-left-width: 1px;
	border-top-width: 0px;
	border-right-width: 0px;
	border-style: solid;
	border-bottom-left-radius: 4px;
	padding-bottom: 3px;
	transition: opacity .2s ease-out;
	cursor: default;
	user-select: none;
	padding-left: 2px;
}

.toolbox:hover {
	opacity: 1;
}

.toolbox>* {
	display: inline-block;
	padding-left: 3px;
	padding-right: 3px;
	cursor: pointer;
	min-width: 14px;
	text-align: center;
}

.toolbox>a {
	font-size: 13px;
}

@media (prefers-color-scheme: dark) {
	.toolbox {
		background-color: #484848;
		border-color: #242424;
	}

	.status {
		background-color: #484848;
		border-color: #242424;
		color: lightgrey;
	}
}
body {
  white-space: pre-wrap;
  word-break: break-word;
  font-family: monospace;
}

.property {
  font-weight: bold;
}

.type-null {
  color: gray;
}

.type-boolean {
  color: firebrick;
}

.type-number {
  color: blue;
}

.type-string {
  color: green;
}

.callback-function {
  color: gray;
}

.ellipsis::after {
  content: " � ";
}

.collapser {
  position: absolute;
  top: .1em;
  left: -2ch;
  cursor: default;
  user-select: none;
  padding-inline: 0.5ch;
}

.collapser::after {
  cursor: pointer;
  content: "-";
}

.collapsed > .collapser::after {
  content: "+";
}

.collapsible {
  margin-inline-start: 4ch;
}

.collapsible .collapsible::before {
  content: "";
  position: absolute;
  left: 0.5ch;
  top: 1.8em;
  height: calc(100% - 3.6em);
  border: 0;
  border-inline-start: #d3d3d3 0.2ch dashed;
}

.hoverable {
  display: inline-block;
  padding: 0.1em;
  transition: background-color 0.2s ease-out 0s;
}

.hovered {
  background-color: rgba(235, 238, 249, 1);
  transition-delay: 0.2s;
}

.selected {
  outline: dotted 0.1ch;
}

@media (prefers-color-scheme: dark) {
  body {
    background-color: #282828;
    color: lightgrey;
  }

  .hovered {
    background-color: #424242;
  }

  .type-boolean {
    color: tomato;
  }

  .type-number {
    color: dodgerblue;
  }

  .type-string {
    color: yellowgreen;
  }

  a {
    color: dodgerblue;
  }

  .collapsible .collapsible::before {
    border-color: #484848;
  }
}</style>
</head>
<body>

        <div id="json">
            <div class="collapser"></div>{<span class="ellipsis"></span><ul class="obj collapsible"><li><div class="hoverable"><span class="property">they call us dreamers</span>: <div class="collapser"></div>[<span class="ellipsis"></span><ul class="array collapsible"><li><div class="hoverable"><div class="collapser"></div>{<span class="ellipsis"></span><ul class="obj collapsible"><li><div class="hoverable"><span class="property">but we are the ones</span>: <span class="type-string">"who dont sleep"</span></div></li></ul>}</div></li></ul>]</div></li></ul>}</div>
        </div>
    </main>
</body>
</html>
